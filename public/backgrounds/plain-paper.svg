<svg width="794" height="1123" viewBox="0 0 794 1123" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1123" gradientUnits="userSpaceOnUse">
    <stop stop-color="#FDFCF7"/>
    <stop offset="1" stop-color="#F8F6EF"/>
  </linearGradient>
  <filter id="grain" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" />
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.06"/>
    </feComponentTransfer>
  </filter>
</defs>
<rect width="794" height="1123" fill="url(#paper)"/>
<rect width="794" height="1123" filter="url(#grain)" fill="#000"/>
</svg>
